version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "200201"
      POSTGRES_DB: iot_fan_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed to host to avoid conflicts with old db

  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:200201@db:5432/iot_fan_db
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - DEVICE_ID=FAN-001,FAN-002
      - DASHBOARD_USERNAME=admin
      - DASHBOARD_PASSWORD=admin123
    depends_on:
      - db
      - mosquitto

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://145.79.15.108:8001
      - NEXT_PUBLIC_DEVICE_ID=FAN-001,FAN-002
      - NEXT_PUBLIC_ALLOWED_DEVICE_IDS=FAN-001,FAN-002
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/iotfan.online:/etc/letsencrypt/live/iotfan.online:ro
      - /etc/letsencrypt/archive/iotfan.online:/etc/letsencrypt/archive/iotfan.online:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
